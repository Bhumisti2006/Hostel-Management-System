<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMS · Hostel Management System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="side">
      <div class="logo-block">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
        </div>
        <div>
          <div class="logo-title">HMS</div>
          <div class="logo-sub">Hostel management</div>
        </div>
      </div>

      <div class="sep"></div>

      <nav class="nav-list">
        <div class="nav-label">Menu</div>
        <div class="nav-item active" data-panel="0" onclick="nav(0)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </div>
        <div class="nav-item" data-panel="1" onclick="nav(1)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Students
        </div>
        <div class="nav-item" data-panel="2" onclick="nav(2)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          Rooms
        </div>
        <div class="nav-item" data-panel="3" onclick="nav(3)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Fee Status
        </div>
        <div class="nav-item" data-panel="4" onclick="nav(4)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Complaints
        </div>
      </nav>

      <div class="sep"></div>

      <div class="prof-block">
        <div class="av av-info">A</div>
        <div>
          <div class="prof-name">Admin</div>
          <div class="prof-role">Super user</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main">
      <div class="panel active" id="p0"></div>
      <div class="panel" id="p1"></div>
      <div class="panel" id="p2"></div>
      <div class="panel" id="p3"></div>
      <div class="panel" id="p4"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
